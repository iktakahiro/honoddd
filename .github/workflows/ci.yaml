name: Tests and Checks

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: tests-checks-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  tests_and_checks:
    name: Tests and Checks
    runs-on: ubuntu-latest
    env:
      CI: "true"
      NODE_OPTIONS: "--max-old-space-size=4096"
      TURBO_TELEMETRY_DISABLED: "1"
      TZ: Asia/Tokyo
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun audit --audit-level high

      - name: Restore Turbo local artifacts
        id: turbo-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Run tests and checks
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          filter=()
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$BASE_SHA" ]; then
            filter=("--filter=...[$BASE_SHA]")
          fi

          bun turbo run type-check test quality "${filter[@]}" --cache-dir="$HOME/.cache/turbo"

      - name: Save Turbo local artifacts
        if: github.event_name == 'push' && steps.turbo-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/turbo
          key: ${{ steps.turbo-cache.outputs.cache-primary-key }}

  github_actions_security:
    name: GitHub Actions Security
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          annotations: true
          min-severity: low
          version: v1.25.2
